services:
  db:
    image: postgres:15-alpine
    container_name: employeehub-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: administrator
      POSTGRES_DB: employeehub
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - docker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d employeehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./employeeapi
      dockerfile: Dockerfile
    container_name: employeehub-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/employeehub
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: administrator
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_GENERATE_DDL: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 100MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 100MB
      SERVER_PORT: 8080
      LOGGING_LEVEL_ROOT: INFO
      PHOTO_DIRECTORY: /app/photos/
    ports:
      - "8080:8080"
    volumes:
      - employee_photos:/app/photos
    networks:
      - docker-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./employeehub
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080
    container_name: employeehub-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - docker-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  dashboard:
    build:
      context: ./hrdashboard
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080
    container_name: employeehub-hrdashboard
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - docker-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  docker-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  employee_photos:
    driver: local
